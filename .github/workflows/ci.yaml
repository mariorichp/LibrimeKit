name: Build LibrimeKit (arm64 simulator)
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - arm64sim

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install cmake
          sudo gem install cocoapods

      - name: Build Boost
        run: |
          make boost-build

      - name: Build Librime (with arm64 simulator)
        run: |
          chmod +x librimeBuild_arm64sim.sh
          bash librimeBuild_arm64sim.sh

      - name: Make Archive
        run: |
          tar -acf Frameworks.tgz Frameworks

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: librimekit-frameworks-arm64sim
          path: Frameworks.tgz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        id: upload_release_asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Frameworks.tgz
          asset_name: Frameworks.tgz
          asset_content_type: application/gzip
